<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="1600" height="720" font-family="ui-monospace, JetBrains Mono, Menlo, monospace">
<title>mars-greenhouse-ops — the dome, deployed and phoning home</title>
<desc>Mono cinematic Mars night: a glowing greenhouse dome on the red horizon beams a dashed uplink to a cloud datacenter holding one big box of tools. CC0.</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#0e0e0c"/>
    <stop offset="60%" stop-color="#1a1613"/>
    <stop offset="100%" stop-color="#2a201a"/>
  </linearGradient>
  <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#241812"/>
    <stop offset="100%" stop-color="#0e0906"/>
  </linearGradient>
  <radialGradient id="domeGlow" cx="50%" cy="60%" r="60%">
    <stop offset="0%"   stop-color="#eaf3ec"/>
    <stop offset="55%"  stop-color="#c7dcc9"/>
    <stop offset="100%" stop-color="#7c9a80"/>
  </radialGradient>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#d7efd9" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#d7efd9" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="earth" cx="42%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#cfe4ea"/>
    <stop offset="100%" stop-color="#5c7f8a"/>
  </radialGradient>
  <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"   stop-color="#d7efd9" stop-opacity="0.32"/>
    <stop offset="100%" stop-color="#d7efd9" stop-opacity="0.02"/>
  </linearGradient>
</defs>

<!-- sky + red ground -->
<rect width="1600" height="540" fill="url(#sky)"/>
<rect y="540" width="1600" height="180" fill="url(#ground)"/>
<g fill="#000" opacity="0.12">
  <circle cx="140" cy="70" r="1.3"/><circle cx="300" cy="130" r="1"/><circle cx="470" cy="60" r="1.2"/>
  <circle cx="640" cy="140" r="1"/><circle cx="90" cy="240" r="1"/><circle cx="380" cy="250" r="1"/>
  <circle cx="700" cy="230" r="1"/><circle cx="250" cy="200" r="1"/><circle cx="560" cy="300" r="1"/>
</g>
<!-- Earth in the sky (home) -->
<circle cx="230" cy="150" r="34" fill="url(#earth)"/>
<path d="M208 140 q14 -10 30 -2 q-8 12 -24 10 z" fill="#3f5a52" opacity="0.7"/>
<text x="230" y="212" text-anchor="middle" fill="#6b6b68" font-size="12">home</text>

<!-- crater horizon -->
<path d="M0 560 q400 -60 800 -10 q400 40 800 -6 v180 H0 Z" fill="#1c1310"/>
<g fill="#0e0906" opacity="0.7"><ellipse cx="360" cy="600" rx="70" ry="12"/><ellipse cx="1180" cy="628" rx="90" ry="14"/></g>

<!-- ===== CLOUD DATACENTER (top-right) ===== -->
<g class="pulse">
  <ellipse cx="1300" cy="150" rx="300" ry="150" fill="url(#halo)"/>
  <path d="M1120 210 a70 70 0 0 1 20 -132 a95 95 0 0 1 178 -20 a70 70 0 0 1 84 66 a60 60 0 0 1 -18 118 h-320 a58 58 0 0 1 -44 -100 z"
        fill="#141210" stroke="#a8c0aa" stroke-width="2.5"/>
</g>
<g stroke="#c7dcc9" fill="none" stroke-width="2">
  <rect x="1210" y="96" width="150" height="96" fill="#0f0d0b"/>
  <line x1="1210" y1="122" x2="1360" y2="122"/>
  <g stroke="#7c9a80" stroke-width="3.4">
    <line x1="1220" y1="140" x2="1220" y2="178"/><line x1="1230" y1="140" x2="1230" y2="178"/>
    <line x1="1240" y1="140" x2="1240" y2="178"/><line x1="1250" y1="140" x2="1250" y2="178"/>
    <line x1="1260" y1="140" x2="1260" y2="178"/><line x1="1270" y1="140" x2="1270" y2="178"/>
    <line x1="1280" y1="140" x2="1280" y2="178"/><line x1="1290" y1="140" x2="1290" y2="178"/>
    <line x1="1300" y1="140" x2="1300" y2="178"/><line x1="1310" y1="140" x2="1310" y2="178"/>
    <line x1="1320" y1="140" x2="1320" y2="178"/><line x1="1330" y1="140" x2="1330" y2="178"/>
    <line x1="1340" y1="140" x2="1340" y2="178"/><line x1="1350" y1="140" x2="1350" y2="178"/>
  </g>
</g>
<text x="1285" y="115" text-anchor="middle" fill="#eaf3ec" font-size="15" font-weight="700">32 tools</text>
<text x="1285" y="232" text-anchor="middle" fill="#a8c0aa" font-size="14">Toolbox · Foundry</text>

<!-- orbiting relay satellite -->
<g class="sat">
  <rect x="980" y="150" width="26" height="16" fill="#1c1c1a" stroke="#a8c0aa" stroke-width="1.5"/>
  <rect x="954" y="153" width="22" height="10" fill="#0f0d0b" stroke="#7c9a80" stroke-width="1"/>
  <rect x="1010" y="153" width="22" height="10" fill="#0f0d0b" stroke="#7c9a80" stroke-width="1"/>
</g>

<!-- ===== UPLINK BEAM: dome -> cloud ===== -->
<path d="M980 470 L1230 210" stroke="url(#beam)" stroke-width="26" fill="none" opacity="0.5"/>
<line x1="980" y1="470" x2="1230" y2="210" stroke="#7c9a80" stroke-width="1.4" stroke-dasharray="6 8"/>
<g class="up"><rect x="-5" y="-5" width="10" height="10" fill="#d7efd9"/></g>
<g class="down"><circle r="6" fill="#c7dcc9"/></g>
<text x="1050" y="330" fill="#a8c0aa" font-size="13" transform="rotate(-46 1050 330)">tool_search &#8593;</text>

<!-- ===== GREENHOUSE DOME (foreground) ===== -->
<ellipse cx="820" cy="600" rx="260" ry="30" fill="#d7efd9" opacity="0.06"/>
<g>
  <ellipse cx="820" cy="520" rx="200" ry="150" fill="url(#halo)"/>
  <!-- dome glass -->
  <path d="M660 560 a160 150 0 0 1 320 0 z" fill="url(#domeGlow)" stroke="#0e0906" stroke-width="3"/>
  <!-- dome ribs -->
  <g stroke="#0e0906" stroke-width="2" fill="none" opacity="0.7">
    <path d="M700 560 a120 150 0 0 1 240 0"/>
    <path d="M745 560 a75 150 0 0 1 150 0"/>
    <line x1="660" y1="560" x2="980" y2="560"/>
    <line x1="820" y1="410" x2="820" y2="560"/>
  </g>
  <!-- plant rows inside -->
  <g stroke="#3f5a44" stroke-width="4">
    <line x1="740" y1="548" x2="740" y2="520"/><line x1="770" y1="548" x2="770" y2="512"/>
    <line x1="800" y1="548" x2="800" y2="506"/><line x1="835" y1="548" x2="835" y2="510"/>
    <line x1="868" y1="548" x2="868" y2="518"/><line x1="898" y1="548" x2="898" y2="526"/>
  </g>
  <!-- base -->
  <rect x="650" y="558" width="340" height="20" fill="#161311" stroke="#2a201a" stroke-width="2"/>
  <!-- dish antenna beaming up -->
  <line x1="978" y1="500" x2="1010" y2="452" stroke="#a8c0aa" stroke-width="3"/>
  <ellipse cx="1012" cy="448" rx="26" ry="12" fill="none" stroke="#c7dcc9" stroke-width="2.5" transform="rotate(-40 1012 448)"/>
</g>

<!-- ===== caption filmstrip ===== -->
<rect y="650" width="1600" height="70" fill="#0e0906"/>
<g fill="#2a201a"><rect x="20" y="662" width="14" height="10"/><rect x="20" y="678" width="14" height="10"/><rect x="20" y="694" width="14" height="10"/>
  <rect x="1566" y="662" width="14" height="10"/><rect x="1566" y="678" width="14" height="10"/><rect x="1566" y="694" width="14" height="10"/></g>
<text x="70" y="694" fill="#eaf3ec" font-size="22" font-weight="700">mars-greenhouse-ops — cloud</text>
<text x="1530" y="694" text-anchor="end" fill="#6b6b68" font-size="14">// deployed on Foundry · the model writes its own search · CC0</text>

<style>
  .pulse { animation: pulse 5s ease-in-out infinite; transform-origin: 1300px 150px; }
  @keyframes pulse { 50% { opacity: 0.82; } }
  .sat { animation: sat 9s ease-in-out infinite; transform-origin: center; }
  @keyframes sat { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-10px); } }
  .up   { animation: up 3.6s linear infinite; }
  .down { animation: down 3.6s linear infinite; animation-delay: 1.8s; }
  @keyframes up   { 0% { transform: translate(980px,470px); opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translate(1230px,210px); opacity: 0; } }
  @keyframes down { 0% { transform: translate(1230px,210px); opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translate(980px,470px); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .pulse,.sat,.up,.down { animation: none; } .up,.down { opacity: 0; } }
</style>
</svg>
