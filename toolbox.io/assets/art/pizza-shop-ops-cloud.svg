<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="1600" height="720" font-family="ui-monospace, JetBrains Mono, Menlo, monospace">
<title>pizza-shop-ops — the shop's line cook, now hosted in the cloud</title>
<desc>Mono cinematic night: a glowing pizzeria on the ground beams its orders up a dashed uplink to a cloud datacenter holding one big box of tools. CC0.</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#0e0e0c"/>
    <stop offset="55%" stop-color="#1a1a17"/>
    <stop offset="100%" stop-color="#28281f"/>
  </linearGradient>
  <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#1a1a17"/>
    <stop offset="100%" stop-color="#0a0a08"/>
  </linearGradient>
  <radialGradient id="win" cx="50%" cy="55%" r="65%">
    <stop offset="0%"   stop-color="#fbf6df"/>
    <stop offset="55%"  stop-color="#f0e8c8"/>
    <stop offset="100%" stop-color="#a89c70"/>
  </radialGradient>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#f5f1de" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#f5f1de" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"   stop-color="#f5f1de" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#f5f1de" stop-opacity="0.02"/>
  </linearGradient>
</defs>

<!-- sky + ground -->
<rect width="1600" height="560" fill="url(#sky)"/>
<rect y="560" width="1600" height="160" fill="url(#ground)"/>
<g fill="#000" opacity="0.11">
  <circle cx="120" cy="60" r="1.4"/><circle cx="260" cy="120" r="1"/><circle cx="410" cy="48" r="1.2"/>
  <circle cx="560" cy="150" r="1"/><circle cx="700" cy="70" r="1.3"/><circle cx="300" cy="220" r="1"/>
  <circle cx="880" cy="60" r="1"/><circle cx="1180" cy="360" r="1.2"/><circle cx="90" cy="300" r="1"/>
  <circle cx="620" cy="260" r="1"/><circle cx="470" cy="330" r="1"/><circle cx="180" cy="190" r="1"/>
</g>

<!-- distant city silhouette -->
<g fill="#1c1c1a" opacity="0.7">
  <rect x="0" y="470" width="120" height="90"/><rect x="120" y="440" width="80" height="120"/>
  <rect x="200" y="490" width="70" height="70"/><rect x="270" y="455" width="100" height="105"/>
  <rect x="370" y="480" width="70" height="80"/><rect x="440" y="500" width="90" height="60"/>
</g>

<!-- ===== CLOUD DATACENTER (top-right) ===== -->
<g class="pulse">
  <ellipse cx="1300" cy="150" rx="300" ry="150" fill="url(#halo)"/>
  <!-- cloud outline -->
  <path d="M1120 210 a70 70 0 0 1 20 -132 a95 95 0 0 1 178 -20 a70 70 0 0 1 84 66 a60 60 0 0 1 -18 118 h-320 a58 58 0 0 1 -44 -100 z"
        fill="#141412" stroke="#bcae86" stroke-width="2.5"/>
</g>
<!-- the one big box, inside the cloud -->
<g stroke="#d6cfb2" fill="none" stroke-width="2">
  <rect x="1210" y="96" width="150" height="96" fill="#0f0f0d"/>
  <line x1="1210" y1="122" x2="1360" y2="122"/>
  <!-- tool ticks: many tools in the box -->
  <g stroke="#8f8a72" stroke-width="4">
    <line x1="1224" y1="140" x2="1224" y2="178"/><line x1="1238" y1="140" x2="1238" y2="178"/>
    <line x1="1252" y1="140" x2="1252" y2="178"/><line x1="1266" y1="140" x2="1266" y2="178"/>
    <line x1="1280" y1="140" x2="1280" y2="178"/><line x1="1294" y1="140" x2="1294" y2="178"/>
    <line x1="1308" y1="140" x2="1308" y2="178"/><line x1="1322" y1="140" x2="1322" y2="178"/>
    <line x1="1336" y1="140" x2="1336" y2="178"/><line x1="1350" y1="140" x2="1350" y2="178"/>
  </g>
</g>
<text x="1285" y="115" text-anchor="middle" fill="#f5f1de" font-size="15" font-weight="700">18 tools</text>
<text x="1285" y="232" text-anchor="middle" fill="#bcae86" font-size="14">Toolbox · Foundry</text>

<!-- ===== UPLINK BEAM: shop -> cloud ===== -->
<path d="M1120 520 L1230 210" stroke="url(#beam)" stroke-width="26" fill="none" opacity="0.5"/>
<line x1="1120" y1="520" x2="1230" y2="210" stroke="#8f8a72" stroke-width="1.4" stroke-dasharray="6 8"/>
<!-- traveling packets: query up, pie/result down -->
<g class="up"><rect x="-5" y="-5" width="10" height="10" fill="#f5f1de"/></g>
<g class="down"><circle r="6" fill="#f0e8c8"/></g>
<text x="1055" y="360" fill="#bcae86" font-size="13" transform="rotate(-70 1055 360)">tool_search &#8593;</text>

<!-- ===== PIZZERIA (foreground) ===== -->
<ellipse cx="880" cy="590" rx="240" ry="30" fill="#f5f1de" opacity="0.06"/>
<g>
  <!-- building -->
  <rect x="720" y="360" width="320" height="230" fill="#161614" stroke="#2a2825" stroke-width="2"/>
  <!-- awning -->
  <path d="M700 360 h360 l-24 44 h-312 z" fill="#1c1c1a" stroke="#bcae86" stroke-width="2"/>
  <g stroke="#0a0a08" stroke-width="6">
    <line x1="726" y1="360" x2="710" y2="404"/><line x1="770" y1="360" x2="756" y2="404"/>
    <line x1="814" y1="360" x2="802" y2="404"/><line x1="858" y1="360" x2="848" y2="404"/>
    <line x1="902" y1="360" x2="894" y2="404"/><line x1="946" y1="360" x2="940" y2="404"/>
    <line x1="990" y1="360" x2="986" y2="404"/><line x1="1034" y1="360" x2="1032" y2="404"/>
  </g>
  <!-- glowing window -->
  <rect x="756" y="430" width="150" height="130" fill="url(#win)"/>
  <ellipse cx="831" cy="495" rx="150" ry="110" fill="url(#halo)"/>
  <rect x="756" y="430" width="150" height="130" fill="none" stroke="#0a0a08" stroke-width="3"/>
  <line x1="831" y1="430" x2="831" y2="560" stroke="#0a0a08" stroke-width="2"/>
  <line x1="756" y1="495" x2="906" y2="495" stroke="#0a0a08" stroke-width="2"/>
  <!-- door -->
  <rect x="940" y="470" width="70" height="120" fill="#0f0f0d" stroke="#2a2825" stroke-width="2"/>
  <!-- neon OPEN sign -->
  <g class="neon"><rect x="770" y="392" width="90" height="26" fill="none" stroke="#f5f1de" stroke-width="2"/>
    <text x="815" y="411" text-anchor="middle" fill="#f5f1de" font-size="16" font-weight="700">OPEN</text></g>
  <!-- dish/antenna on roof beaming up -->
  <line x1="1055" y1="360" x2="1120" y2="300" stroke="#bcae86" stroke-width="3"/>
  <ellipse cx="1120" cy="296" rx="26" ry="12" fill="none" stroke="#d6cfb2" stroke-width="2.5" transform="rotate(-38 1120 296)"/>
</g>

<!-- ===== caption filmstrip ===== -->
<rect y="650" width="1600" height="70" fill="#0a0a08"/>
<g fill="#2a2825"><rect x="20" y="662" width="14" height="10"/><rect x="20" y="678" width="14" height="10"/><rect x="20" y="694" width="14" height="10"/>
  <rect x="1566" y="662" width="14" height="10"/><rect x="1566" y="678" width="14" height="10"/><rect x="1566" y="694" width="14" height="10"/></g>
<text x="70" y="694" fill="#f5f1de" font-size="22" font-weight="700">pizza-shop-ops — cloud</text>
<text x="1530" y="694" text-anchor="end" fill="#6b6b68" font-size="14">// hosted on Foundry · big box, tiny context · CC0</text>

<style>
  .pulse { animation: pulse 5s ease-in-out infinite; transform-origin: 1300px 150px; }
  @keyframes pulse { 50% { opacity: 0.82; } }
  .neon { animation: neon 4s steps(1) infinite; }
  @keyframes neon { 0%,92%,100% { opacity: 1; } 94% { opacity: 0.3; } 96% { opacity: 1; } }
  .up   { animation: up 3.4s linear infinite; }
  .down { animation: down 3.4s linear infinite; animation-delay: 1.7s; }
  @keyframes up   { 0% { transform: translate(1120px,520px); opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translate(1230px,210px); opacity: 0; } }
  @keyframes down { 0% { transform: translate(1230px,210px); opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translate(1120px,520px); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .pulse,.neon,.up,.down { animation: none; } .up,.down { opacity: 0; } }
</style>
</svg>
