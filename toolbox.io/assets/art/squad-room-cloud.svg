<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" width="1600" height="720" font-family="ui-monospace, JetBrains Mono, Menlo, monospace">
<title>squad-room — one whole team, one governed box in the cloud</title>
<desc>Mono cinematic night: three glowing workstations (lead, researcher, builder) all wire up to a single governed cloud toolbox; the release path passes through an approval lock. CC0.</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#0e0e0c"/>
    <stop offset="55%" stop-color="#181818"/>
    <stop offset="100%" stop-color="#242426"/>
  </linearGradient>
  <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="#161618"/>
    <stop offset="100%" stop-color="#08080a"/>
  </linearGradient>
  <radialGradient id="scr" cx="50%" cy="45%" r="65%">
    <stop offset="0%"   stop-color="#eef2fb"/>
    <stop offset="55%"  stop-color="#c9d4ea"/>
    <stop offset="100%" stop-color="#7f8ba6"/>
  </radialGradient>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#dfe6f5" stop-opacity="0.42"/>
    <stop offset="100%" stop-color="#dfe6f5" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"   stop-color="#dfe6f5" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#dfe6f5" stop-opacity="0.02"/>
  </linearGradient>
</defs>

<!-- sky + floor -->
<rect width="1600" height="540" fill="url(#sky)"/>
<rect y="540" width="1600" height="180" fill="url(#ground)"/>
<g fill="#000" opacity="0.1">
  <circle cx="160" cy="70" r="1.3"/><circle cx="340" cy="120" r="1"/><circle cx="520" cy="60" r="1.2"/>
  <circle cx="90" cy="230" r="1"/><circle cx="400" cy="250" r="1"/><circle cx="250" cy="180" r="1"/>
  <circle cx="620" cy="210" r="1"/><circle cx="700" cy="300" r="1"/>
</g>

<!-- ===== CLOUD: the ONE governed toolbox (top-center-right) ===== -->
<g class="pulse">
  <ellipse cx="1180" cy="150" rx="330" ry="150" fill="url(#halo)"/>
  <path d="M1000 210 a70 70 0 0 1 20 -132 a95 95 0 0 1 178 -20 a70 70 0 0 1 84 66 a60 60 0 0 1 -18 118 h-320 a58 58 0 0 1 -44 -100 z"
        fill="#131315" stroke="#aab6cf" stroke-width="2.5"/>
</g>
<g stroke="#c9d4ea" fill="none" stroke-width="2">
  <rect x="1090" y="96" width="150" height="96" fill="#0e0e10"/>
  <line x1="1090" y1="122" x2="1240" y2="122"/>
  <!-- 48 tools -> dense tick field, two rows -->
  <g stroke="#7f8ba6" stroke-width="2.4">
    <line x1="1100" y1="132" x2="1100" y2="152"/><line x1="1108" y1="132" x2="1108" y2="152"/><line x1="1116" y1="132" x2="1116" y2="152"/><line x1="1124" y1="132" x2="1124" y2="152"/><line x1="1132" y1="132" x2="1132" y2="152"/><line x1="1140" y1="132" x2="1140" y2="152"/><line x1="1148" y1="132" x2="1148" y2="152"/><line x1="1156" y1="132" x2="1156" y2="152"/><line x1="1164" y1="132" x2="1164" y2="152"/><line x1="1172" y1="132" x2="1172" y2="152"/><line x1="1180" y1="132" x2="1180" y2="152"/><line x1="1188" y1="132" x2="1188" y2="152"/><line x1="1196" y1="132" x2="1196" y2="152"/><line x1="1204" y1="132" x2="1204" y2="152"/><line x1="1212" y1="132" x2="1212" y2="152"/><line x1="1220" y1="132" x2="1220" y2="152"/><line x1="1228" y1="132" x2="1228" y2="152"/>
    <line x1="1100" y1="160" x2="1100" y2="180"/><line x1="1108" y1="160" x2="1108" y2="180"/><line x1="1116" y1="160" x2="1116" y2="180"/><line x1="1124" y1="160" x2="1124" y2="180"/><line x1="1132" y1="160" x2="1132" y2="180"/><line x1="1140" y1="160" x2="1140" y2="180"/><line x1="1148" y1="160" x2="1148" y2="180"/><line x1="1156" y1="160" x2="1156" y2="180"/><line x1="1164" y1="160" x2="1164" y2="180"/><line x1="1172" y1="160" x2="1172" y2="180"/><line x1="1180" y1="160" x2="1180" y2="180"/><line x1="1188" y1="160" x2="1188" y2="180"/><line x1="1196" y1="160" x2="1196" y2="180"/><line x1="1204" y1="160" x2="1204" y2="180"/><line x1="1212" y1="160" x2="1212" y2="180"/><line x1="1220" y1="160" x2="1220" y2="180"/><line x1="1228" y1="160" x2="1228" y2="180"/>
  </g>
</g>
<text x="1165" y="115" text-anchor="middle" fill="#eef2fb" font-size="15" font-weight="700">48 tools</text>
<text x="1165" y="232" text-anchor="middle" fill="#aab6cf" font-size="14">one governed Toolbox</text>

<!-- approval gate on the release path -->
<g class="lockpulse">
  <rect x="1300" y="300" width="60" height="52" rx="6" fill="#0e0e10" stroke="#dfe6f5" stroke-width="2.5"/>
  <path d="M1314 300 v-12 a16 16 0 0 1 32 0 v12" fill="none" stroke="#dfe6f5" stroke-width="2.5"/>
  <circle cx="1330" cy="322" r="5" fill="#dfe6f5"/><rect x="1327" y="322" width="6" height="14" fill="#dfe6f5"/>
</g>
<text x="1330" y="372" text-anchor="middle" fill="#aab6cf" font-size="12">releases.cut</text>
<text x="1330" y="388" text-anchor="middle" fill="#6b6b68" font-size="11">approval</text>

<!-- ===== three uplinks converge on the one box ===== -->
<g fill="none" stroke-width="1.4" stroke-dasharray="6 8" stroke="#7f8ba6">
  <path d="M360 470 C520 360 900 300 1120 210"/>
  <path d="M760 470 C860 380 1000 300 1130 212"/>
  <path d="M1160 470 C1180 400 1170 320 1150 214"/>
</g>
<path d="M360 470 C520 360 900 300 1120 210" fill="none" stroke="url(#beam)" stroke-width="20" opacity="0.4"/>
<g class="up"><rect x="-5" y="-5" width="9" height="9" fill="#dfe6f5"/></g>
<g class="up2"><rect x="-4" y="-4" width="8" height="8" fill="#dfe6f5"/></g>

<!-- ===== three workstations: lead / researcher / builder ===== -->
<ellipse cx="760" cy="600" rx="640" ry="34" fill="#dfe6f5" opacity="0.05"/>
<g font-size="14" fill="#aab6cf" text-anchor="middle">
  <!-- desk 1: lead -->
  <g>
    <ellipse cx="360" cy="500" rx="130" ry="90" fill="url(#halo)"/>
    <rect x="300" y="430" width="120" height="80" rx="4" fill="url(#scr)" stroke="#08080a" stroke-width="3"/>
    <rect x="352" y="510" width="16" height="30" fill="#161618"/><rect x="330" y="540" width="60" height="10" fill="#101012"/>
    <rect x="270" y="550" width="180" height="14" fill="#131315" stroke="#242426" stroke-width="1.5"/>
    <text x="360" y="592">lead</text>
  </g>
  <!-- desk 2: researcher -->
  <g>
    <ellipse cx="760" cy="500" rx="130" ry="90" fill="url(#halo)"/>
    <rect x="700" y="430" width="120" height="80" rx="4" fill="url(#scr)" stroke="#08080a" stroke-width="3"/>
    <rect x="752" y="510" width="16" height="30" fill="#161618"/><rect x="730" y="540" width="60" height="10" fill="#101012"/>
    <rect x="670" y="550" width="180" height="14" fill="#131315" stroke="#242426" stroke-width="1.5"/>
    <text x="760" y="592">researcher</text>
  </g>
  <!-- desk 3: builder -->
  <g>
    <ellipse cx="1160" cy="500" rx="130" ry="90" fill="url(#halo)"/>
    <rect x="1100" y="430" width="120" height="80" rx="4" fill="url(#scr)" stroke="#08080a" stroke-width="3"/>
    <rect x="1152" y="510" width="16" height="30" fill="#161618"/><rect x="1130" y="540" width="60" height="10" fill="#101012"/>
    <rect x="1070" y="550" width="180" height="14" fill="#131315" stroke="#242426" stroke-width="1.5"/>
    <text x="1160" y="592">builder</text>
  </g>
</g>
<!-- each screen shows the same two meta-tools -->
<g font-size="10" fill="#3a4056" text-anchor="middle">
  <text x="360" y="466">tool_search</text><text x="360" y="480">call_tool</text>
  <text x="760" y="466">tool_search</text><text x="760" y="480">call_tool</text>
  <text x="1160" y="466">tool_search</text><text x="1160" y="480">call_tool</text>
</g>

<!-- ===== caption filmstrip ===== -->
<rect y="650" width="1600" height="70" fill="#08080a"/>
<g fill="#242426"><rect x="20" y="662" width="14" height="10"/><rect x="20" y="678" width="14" height="10"/><rect x="20" y="694" width="14" height="10"/>
  <rect x="1566" y="662" width="14" height="10"/><rect x="1566" y="678" width="14" height="10"/><rect x="1566" y="694" width="14" height="10"/></g>
<text x="70" y="694" fill="#eef2fb" font-size="22" font-weight="700">squad-room — cloud</text>
<text x="1530" y="694" text-anchor="end" fill="#6b6b68" font-size="14">// one box, one team · the release waits for the lead · CC0</text>

<style>
  .pulse { animation: pulse 5s ease-in-out infinite; transform-origin: 1180px 150px; }
  @keyframes pulse { 50% { opacity: 0.82; } }
  .lockpulse { animation: lockpulse 3s ease-in-out infinite; transform-origin: 1330px 326px; }
  @keyframes lockpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  .up   { animation: up 4s linear infinite; offset-path: path('M360 470 C520 360 900 300 1120 210'); }
  .up2  { animation: up 4s linear infinite; animation-delay: 2s; offset-path: path('M360 470 C520 360 900 300 1120 210'); }
  @keyframes up { 0% { offset-distance: 0%; opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .pulse,.lockpulse,.up,.up2 { animation: none; } .up,.up2 { opacity: 0; } }
</style>
</svg>
