<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 400" width="1320" height="400" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
<title>mars-greenhouse-ops — the shape of it</title>
<desc>One endpoint, tiny context: inputs to a hosted Foundry agent, to a Toolbox with Tool Search, to an MCP server on Azure Container Apps. CC0.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#1A1A1A"/></marker>
</defs>
<rect x="0" y="0" width="1320" height="400" fill="#D6D6D4"/>
