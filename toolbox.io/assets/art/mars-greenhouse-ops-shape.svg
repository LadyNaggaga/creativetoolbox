<rect x="40" y="120" width="170" height="80" rx="4" fill="#cfcfcd" stroke="#1A1A1A" stroke-width="2"/>
<text x="125" y="156" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="19" fill="#1A1A1A">crew</text>
