<text x="694" y="323" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="15" fill="#6B6B68">…</text>
<text x="30" y="384" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" fill="#6B6B68">many tools in the box · exactly 2 (tool_search + call_tool) in the model’s context</text>
