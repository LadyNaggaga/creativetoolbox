<text x="830" y="156" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="19" fill="#1A1A1A">Toolbox + Tool Search</text>
<text x="830" y="182" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="13" fill="#6B6B68">Foundry · toolbox_search_preview</text>
