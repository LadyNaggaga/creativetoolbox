<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
  <title>mars-greenhouse-ops — architecture · toolbox.io</title>
  <desc>Agent ↔ Toolbox ↔ tools.json. The model context stays at two tools (+ one pinned) while 24 tools live behind the box.</desc>

  <style>
    .ink   { stroke: #1a1a1a; fill: none; }
    .faint { stroke: #6b6b68; fill: none; }
    .fi    { fill: #1a1a1a; }
    .ff    { fill: #6b6b68; }
    .box   { stroke: #1a1a1a; stroke-width: 2; fill: none; }
    .lbl   { font-size: 14px; fill: #6b6b68; }
    .hd    { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
    .row   { font-size: 15px; fill: #1a1a1a; }
    .rowf  { font-size: 13px; fill: #6b6b68; }
    .blink { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* token travels: agent -> toolbox -> tools -> back. Path is set up via motion-path. */
    .token { offset-path: path('M 340 280 L 460 280 L 740 280 L 860 280 L 860 360 L 740 360 L 460 360 L 340 360'); offset-rotate: 0deg; animation: travel 5s linear infinite; }
    @keyframes travel {
      0%   { offset-distance: 0%;  opacity: 0; }
      4%   { opacity: 1; }
      48%  { offset-distance: 50%; opacity: 1; }
      52%  { offset-distance: 50%; opacity: 1; }
      96%  { offset-distance: 100%; opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .token, .blink { animation: none; }
    }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- background + frame -->
  <rect width="1200" height="630" fill="#d6d6d4"/>
  <rect x="20" y="20" width="1160" height="590" class="box"/>

  <!-- header -->
  <g transform="translate(60,75)">
    <text class="hd">&gt;_ architecture · mars-greenhouse-ops</text>
    <text y="30" class="lbl">one search round-trip · two tools in the model context · 24 in the box</text>
  </g>

  <!-- BOX 1: agent / model context -->
  <g transform="translate(60,180)">
    <rect width="280" height="280" class="box"/>
    <text x="14" y="26" class="lbl">// model context</text>
    <text x="14" y="58" class="hd">agent</text>
    <line x1="14" y1="72" x2="266" y2="72" class="ink" stroke-width="1"/>
    <text x="14" y="104" class="row">▸ tool_search</text>
    <text x="14" y="128" class="row">▸ call_tool</text>
    <text x="14" y="162" class="lbl">— pinned —</text>
    <text x="14" y="184" class="row">▸ sensors.read_air</text>
    <text x="14" y="252" class="rowf">2 + 1 pinned · ~330 tok / turn</text>
  </g>

  <!-- BOX 2: Toolbox -->
  <g transform="translate(460,180)">
    <rect width="280" height="280" class="box"/>
    <text x="14" y="26" class="lbl">// Toolbox on Foundry</text>
    <text x="14" y="58" class="hd">Toolbox</text>
    <line x1="14" y1="72" x2="266" y2="72" class="ink" stroke-width="1"/>
    <text x="14" y="104" class="row">▸ rank descriptions</text>
    <text x="14" y="128" class="row">▸ govern + approve</text>
    <text x="14" y="152" class="row">▸ dispatch call_tool</text>
    <text x="14" y="194" class="rowf">{ "toolbox_search_preview": on }</text>
    <text x="14" y="252" class="rowf">+ ~200 tok per search</text>
  </g>

  <!-- BOX 3: tools.json -->
  <g transform="translate(860,180)">
    <rect width="280" height="280" class="box"/>
    <text x="14" y="26" class="lbl">// 32 tools (never in model context)</text>
    <text x="14" y="58" class="hd">tools.json</text>
    <line x1="14" y1="72" x2="266" y2="72" class="ink" stroke-width="1"/>
    <text x="14" y="98"  class="row" font-size="13">sensors.read_air <tspan class="ff">[pinned]</tspan></text>
    <text x="14" y="116" class="row" font-size="13">kb.search_guides</text>
    <text x="14" y="134" class="row" font-size="13">water.dose</text>
    <text x="14" y="152" class="row" font-size="13">lights.set_intensity</text>
    <text x="14" y="170" class="row" font-size="13">solar.read_budget</text>
    <text x="14" y="188" class="row" font-size="13">harvest.log</text>
    <text x="14" y="206" class="row" font-size="13">seeds.plant</text>
    <text x="14" y="224" class="rowf">… 17 more</text>
    <text x="14" y="252" class="rowf">~0 tok in model context</text>
  </g>

  <!-- flow arrows + labels -->
  <g class="ink" stroke-width="2">
    <line x1="340" y1="280" x2="455" y2="280" marker-end="url(#arr)"/>
    <line x1="740" y1="280" x2="855" y2="280" marker-end="url(#arr)"/>
    <line x1="860" y1="360" x2="745" y2="360" marker-end="url(#arr)"/>
    <line x1="460" y1="360" x2="345" y2="360" marker-end="url(#arr)"/>
  </g>
  <g class="lbl" text-anchor="middle">
    <text x="397" y="270">search("basil…")</text>
    <text x="797" y="270">rank ↓</text>
    <text x="800" y="385">matched 4</text>
    <text x="400" y="385">[kb.search_guides, …]</text>
  </g>

  <!-- traveling token -->
  <circle r="6" cx="0" cy="0" class="token fi"/>

  <!-- footer -->
  <g transform="translate(60,580)">
    <text class="fi" font-size="16" font-weight="700">toolbox.io<tspan class="blink fi"> _</tspan></text>
    <text x="800" class="ff" font-size="12">architecture · mars-greenhouse-ops · CC0 · 1200×630</text>
  </g>
</svg>
