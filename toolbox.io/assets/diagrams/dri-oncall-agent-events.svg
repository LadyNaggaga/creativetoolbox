<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
  <title>dri-oncall-agent — the event and routine loop · toolbox.io</title>
  <desc>Real-time triggers fan into the agent; scheduled routines fan out and re-invoke the same agent under the same guardrails. CC0.</desc>
  <style>
    .ink{stroke:#1a1a1a;fill:none;} .box{stroke:#1a1a1a;stroke-width:2;fill:none;}
    .smbox{stroke:#1a1a1a;stroke-width:1.5;fill:none;}
    .lbl{font-size:14px;fill:#6b6b68;} .hd{font-size:22px;font-weight:700;fill:#1a1a1a;}
    .smhd{font-size:15px;font-weight:700;fill:#1a1a1a;}
    .row{font-size:13px;fill:#1a1a1a;} .rowf{font-size:12px;fill:#6b6b68;}
    .clock{stroke:#1a1a1a;stroke-width:1.5;fill:none;}
    .fi{fill:#1a1a1a;} .ff{fill:#6b6b68;}
    .blink{animation:blink 1s steps(1) infinite;} @keyframes blink{50%{opacity:0;}}

    /* Fan-in tokens travel in the clear channel between left column (right edge x=310) and center box (left edge x=470) */
    .fi1{offset-path:path('M 310 220 L 470 380');animation:t 3s linear infinite;animation-delay:0s;}
    .fi2{offset-path:path('M 310 320 L 470 400');animation:t 3s linear infinite;animation-delay:.5s;}
    .fi3{offset-path:path('M 310 480 L 470 420');animation:t 3s linear infinite;animation-delay:1s;}
    .fi4{offset-path:path('M 310 580 L 470 440');animation:t 3s linear infinite;animation-delay:1.5s;}
    /* Fan-out tokens travel in the clear channel between center box (right edge x=730) and right column (left edge x=890) */
    .fo1{offset-path:path('M 730 380 L 890 220');animation:t 3.6s linear infinite;animation-delay:.3s;}
    .fo2{offset-path:path('M 730 400 L 890 320');animation:t 3.6s linear infinite;animation-delay:.9s;}
    .fo3{offset-path:path('M 730 420 L 890 480');animation:t 3.6s linear infinite;animation-delay:1.5s;}
    .fo4{offset-path:path('M 730 440 L 890 580');animation:t 3.6s linear infinite;animation-delay:2.1s;}
    @keyframes t{0%{offset-distance:0%;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{offset-distance:100%;opacity:0;}}
    @media (prefers-reduced-motion: reduce){.fi1,.fi2,.fi3,.fi4,.fo1,.fo2,.fo3,.fo4,.blink{animation:none;}}
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#d6d6d4"/>
  <rect x="20" y="20" width="1160" height="680" class="box"/>

  <g transform="translate(60,75)">
    <text class="hd">&gt;_ loop 3 · event and routine loop</text>
    <text y="30" class="lbl">triggers fan in · routines fan out · same agent · same guardrails · not polling</text>
  </g>

  <!-- LEFT: 4 triggers (x 80–310, y 170–620) -->
  <text x="80" y="150" class="lbl">// real-time triggers (webhook / event · not polled)</text>
  <g transform="translate(80,170)">
    <rect width="230" height="70" class="smbox"/>
    <text x="14" y="26" class="smhd">IcM webhook</text>
    <text x="14" y="46" class="rowf">IcM-4471293 → agent</text>
    <text x="14" y="62" class="rowf">3s time-to-first-message</text>
  </g>
  <g transform="translate(80,270)">
    <rect width="230" height="70" class="smbox"/>
    <text x="14" y="26" class="smhd">Teams event</text>
    <text x="14" y="46" class="rowf">@mention · reaction · reply</text>
  </g>
  <g transform="translate(80,430)">
    <rect width="230" height="70" class="smbox"/>
    <text x="14" y="26" class="smhd">ADO / GitHub event</text>
    <text x="14" y="46" class="rowf">deploy · PR merged · issue</text>
  </g>
  <g transform="translate(80,530)">
    <rect width="230" height="70" class="smbox"/>
    <text x="14" y="26" class="smhd">telemetry alert</text>
    <text x="14" y="46" class="rowf">threshold · anomaly · SLO burn</text>
  </g>

  <!-- CENTER: agent (x 470–730, y 350–470) -->
  <g transform="translate(470,350)">
    <rect width="260" height="140" class="box"/>
    <text x="14" y="26" class="lbl">// foundry agent runtime</text>
    <text x="14" y="58" class="hd">dri agent</text>
    <text x="14" y="86" class="row">▸ same instructions</text>
    <text x="14" y="106" class="row">▸ same tool policy</text>
    <text x="14" y="126" class="rowf">▸ same approval + citation gates</text>
  </g>

  <!-- RIGHT: 4 routines (x 890–1120, y 170–620) -->
  <text x="890" y="150" class="lbl">// foundry routines (preview · min 5m · one action each)</text>
  <g transform="translate(890,170)">
    <rect width="230" height="70" class="smbox"/>
    <circle cx="205" cy="35" r="10" class="clock"/>
    <line x1="205" y1="35" x2="205" y2="27" class="ink" stroke-width="1.2"/>
    <line x1="205" y1="35" x2="211" y2="35" class="ink" stroke-width="1.2"/>
    <text x="14" y="26" class="smhd">weekday-readiness-scan</text>
    <text x="14" y="46" class="rowf">08:00 PST · weekdays</text>
    <text x="14" y="62" class="rowf">open incidents · risky deploys</text>
  </g>
  <g transform="translate(890,270)">
    <rect width="230" height="70" class="smbox"/>
    <circle cx="205" cy="35" r="10" class="clock"/>
    <line x1="205" y1="35" x2="205" y2="27" class="ink" stroke-width="1.2"/>
    <line x1="205" y1="35" x2="199" y2="35" class="ink" stroke-width="1.2"/>
    <text x="14" y="26" class="smhd">incident-follow-up-30m</text>
    <text x="14" y="46" class="rowf">+30m timer from create</text>
  </g>
  <g transform="translate(890,430)">
    <rect width="230" height="70" class="smbox"/>
    <circle cx="205" cy="35" r="10" class="clock"/>
    <line x1="205" y1="35" x2="199" y2="41" class="ink" stroke-width="1.2"/>
    <line x1="205" y1="35" x2="211" y2="31" class="ink" stroke-width="1.2"/>
    <text x="14" y="26" class="smhd">postmortem-draft-24h</text>
    <text x="14" y="46" class="rowf">+24h timer · draft only</text>
  </g>
  <g transform="translate(890,530)">
    <rect width="230" height="70" class="smbox"/>
    <circle cx="205" cy="35" r="10" class="clock"/>
    <line x1="205" y1="35" x2="205" y2="27" class="ink" stroke-width="1.2"/>
    <line x1="205" y1="35" x2="211" y2="35" class="ink" stroke-width="1.2"/>
    <text x="14" y="26" class="smhd">weekly-learning-loop</text>
    <text x="14" y="46" class="rowf">Mon 09:00 PST</text>
  </g>

  <!-- Fan-in / Fan-out arrows: aimed into the clear channels only -->
  <g class="ink" stroke-width="2">
    <line x1="310" y1="205" x2="465" y2="380" marker-end="url(#arr)"/>
    <line x1="310" y1="305" x2="465" y2="400" marker-end="url(#arr)"/>
    <line x1="310" y1="465" x2="465" y2="420" marker-end="url(#arr)"/>
    <line x1="310" y1="565" x2="465" y2="440" marker-end="url(#arr)"/>

    <line x1="735" y1="380" x2="885" y2="205" marker-end="url(#arr)"/>
    <line x1="735" y1="400" x2="885" y2="305" marker-end="url(#arr)"/>
    <line x1="735" y1="420" x2="885" y2="465" marker-end="url(#arr)"/>
    <line x1="735" y1="440" x2="885" y2="565" marker-end="url(#arr)"/>
  </g>

  <!-- Tokens -->
  <g fill="#1a1a1a">
    <circle r="4" class="fi1"/><circle r="4" class="fi2"/><circle r="4" class="fi3"/><circle r="4" class="fi4"/>
    <circle r="4" class="fo1"/><circle r="4" class="fo2"/><circle r="4" class="fo3"/><circle r="4" class="fo4"/>
  </g>

  <!-- Callout (below everything, no overlap) -->
  <g transform="translate(80,635)">
    <rect width="1040" height="46" class="smbox" stroke-dasharray="4 4"/>
    <text x="14" y="20" class="smhd">routines aren't cron — each action is "invoke this agent with this prompt."</text>
    <text x="14" y="38" class="rowf">→ inherits every guardrail (instructions, tool policy, approval gates, citation contract, audit trail). don't re-implement safety for the scheduler.</text>
  </g>

  <g transform="translate(60,700)">
    <text class="fi" font-size="14" font-weight="700">toolbox.io<tspan class="blink fi"> _</tspan></text>
    <text x="800" class="ff" font-size="11">event / routine loop · dri-oncall-agent · CC0 · 1200×720</text>
  </g>
</svg>
