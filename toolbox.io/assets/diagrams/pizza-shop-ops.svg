<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace">
  <title>pizza-shop-ops — architecture · toolbox.io</title>
  <desc>Agent ↔ Toolbox ↔ tools.json. The oven.set_temp tool is gated; the model context stays at two tools while 24 tools live behind the box.</desc>

  <style>
    .ink   { stroke: #1a1a1a; fill: none; }
    .box   { stroke: #1a1a1a; stroke-width: 2; fill: none; }
    .lbl   { font-size: 14px; fill: #6b6b68; }
    .hd    { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
    .row   { font-size: 15px; fill: #1a1a1a; }
    .rowf  { font-size: 13px; fill: #6b6b68; }
    .fi    { fill: #1a1a1a; }
    .ff    { fill: #6b6b68; }
    .blink { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .token { offset-path: path('M 340 280 L 460 280 L 740 280 L 860 280 L 860 360 L 740 360 L 460 360 L 340 360'); offset-rotate: 0deg; animation: travel 6s linear infinite; }
    @keyframes travel {
      0%   { offset-distance: 0%;  opacity: 0; }
      4%   { opacity: 1; }
      30%  { offset-distance: 31%; opacity: 1; }
      36%  { offset-distance: 50%; opacity: 1; }
      40%  { offset-distance: 50%; opacity: 1; } /* pause at tools (approval) */
      62%  { offset-distance: 50%; opacity: 1; }
      96%  { offset-distance: 100%; opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }
    .gate { animation: gate 6s steps(1) infinite; }
    @keyframes gate {
      0%, 35%, 65%, 100% { opacity: 0; }
      40%, 60%           { opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .token, .blink, .gate { animation: none; }
      .gate { opacity: 1; }
    }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#d6d6d4"/>
  <rect x="20" y="20" width="1160" height="590" class="box"/>

  <g transform="translate(60,75)">
    <text class="hd">&gt;_ architecture · pizza-shop-ops</text>
    <text y="30" class="lbl">one search per intent · oven.set_temp gated · 24 stations in the box</text>
  </g>

  <!-- BOX 1: agent -->
  <g transform="translate(60,180)">
    <rect width="280" height="280" class="box"/>
    <text x="14" y="26" class="lbl">// model context</text>
    <text x="14" y="58" class="hd">agent</text>
    <line x1="14" y1="72" x2="266" y2="72" class="ink" stroke-width="1"/>
    <text x="14" y="104" class="row">▸ tool_search</text>
    <text x="14" y="128" class="row">▸ call_tool</text>
    <text x="14" y="170" class="rowf">no pinned tools</text>
    <text x="14" y="252" class="rowf">2 tools · ~220 tok / turn</text>
  </g>

  <!-- BOX 2: Toolbox -->
  <g transform="translate(460,180)">
    <rect width="280" height="280" class="box"/>
    <text x="14" y="26" class="lbl">// Toolbox on Foundry</text>
    <text x="14" y="58" class="hd">Toolbox</text>
    <line x1="14" y1="72" x2="266" y2="72" class="ink" stroke-width="1"/>
    <text x="14" y="104" class="row">▸ rank descriptions</text>
    <text x="14" y="128" class="row">▸ approval gate</text>
    <text x="14" y="152" class="row">▸ dispatch call_tool</text>
    <text x="14" y="194" class="rowf">approval: oven.set_temp</text>
    <text x="14" y="212" class="rowf">→ pauses for shift-lead</text>
    <text x="14" y="252" class="rowf">+ ~200 tok per search</text>
  </g>

  <!-- BOX 3: tools.json -->
  <g transform="translate(860,180)">
    <rect width="280" height="280" class="box"/>
    <text x="14" y="26" class="lbl">// 24 stations (never in model context)</text>
    <text x="14" y="58" class="hd">tools.json</text>
    <line x1="14" y1="72" x2="266" y2="72" class="ink" stroke-width="1"/>
    <text x="14" y="98"  class="row" font-size="13">oven.set_temp <tspan class="ff">[approval]</tspan></text>
    <text x="14" y="116" class="row" font-size="13">oven.read_temp</text>
    <text x="14" y="134" class="row" font-size="13">inventory.check_stock</text>
    <text x="14" y="152" class="row" font-size="13">dough.recipe</text>
    <text x="14" y="170" class="row" font-size="13">orders.ring</text>
    <text x="14" y="188" class="row" font-size="13">delivery.assign_driver</text>
    <text x="14" y="206" class="row" font-size="13">menu.lookup</text>
    <text x="14" y="224" class="rowf">… 17 more</text>
    <text x="14" y="252" class="rowf">~0 tok in model context</text>
  </g>

  <!-- arrows -->
  <g class="ink" stroke-width="2">
    <line x1="340" y1="280" x2="455" y2="280" marker-end="url(#arr)"/>
    <line x1="740" y1="280" x2="855" y2="280" marker-end="url(#arr)"/>
    <line x1="860" y1="360" x2="745" y2="360" marker-end="url(#arr)"/>
    <line x1="460" y1="360" x2="345" y2="360" marker-end="url(#arr)"/>
  </g>
  <g class="lbl" text-anchor="middle">
    <text x="397" y="270">search("fire the oven…")</text>
    <text x="797" y="270">rank ↓</text>
    <text x="800" y="385">matched 4</text>
    <text x="400" y="385">approved → preheating</text>
  </g>

  <!-- approval gate badge: appears mid-flow -->
  <g class="gate" transform="translate(720,330)">
    <rect x="-72" y="-14" width="144" height="28" fill="#1a1a1a"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#d6d6d4" font-weight="700" letter-spacing="1">[ APPROVAL ]</text>
  </g>

  <!-- traveling token -->
  <circle r="6" cx="0" cy="0" class="token fi"/>

  <!-- footer -->
  <g transform="translate(60,580)">
    <text class="fi" font-size="16" font-weight="700">toolbox.io<tspan class="blink fi"> _</tspan></text>
    <text x="800" class="ff" font-size="12">architecture · pizza-shop-ops · CC0 · 1200×630</text>
  </g>
</svg>
