<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'JetBrains Mono', monospace">
  <rect width="1200" height="630" fill="#D6D6D4"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#1A1A1A" stroke-width="2"/>

  <text x="80" y="130" font-family="Inter, sans-serif" font-weight="700" font-size="52" fill="#1A1A1A">&gt;_ The Squad Room</text>
  <text x="80" y="172" font-size="22" fill="#6B6B68">// one endpoint · many tools · flat cost</text>

  <!-- the counter punchline -->
  <g transform="translate(80,250)">
    <rect x="0" y="0" width="470" height="120" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <text x="30" y="55" font-size="64" font-weight="700" fill="#1A1A1A">24</text>
    <text x="30" y="95" font-size="22" fill="#6B6B68">tools in the box</text>

    <rect x="560" y="0" width="470" height="120" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <text x="590" y="55" font-size="64" font-weight="700" fill="#1A1A1A">2</text>
    <text x="590" y="95" font-size="22" fill="#6B6B68">tools in model context</text>
    <text x="520" y="70" font-size="40" fill="#1A1A1A">→</text>
  </g>

  <text x="80" y="470" font-size="26" fill="#1A1A1A">[tool_search]  describe intent  →  [matched]  →  [call_tool]</text>
  <text x="80" y="520" font-size="22" fill="#6B6B68">// the box grows; the context doesn't<span class="blink">_</span></text>
  <text x="80" y="560" font-size="22" fill="#1A1A1A" font-weight="700">toolbox.io</text>
</svg>
