# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: ai-foundry-starter-basic
services:
    pizza-shop-ops:
        project: ./src/pizza-shop-ops
        host: azure.ai.agent
        language: python
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4o
                    version: "2024-11-20"
                  name: AZURE_AI_MODEL_DEPLOYMENT_NAME
                  sku:
                    capacity: 30
                    name: GlobalStandard
infra:
    provider: bicep
    path: ./infra
